        }
        if (hasAny(['sensor', 'relay', 'actuator', 'automation hardware', 'smart home', 'iot', 'internet of things'])) addSkill('Internet of Things (IoT)');
        if (hasAny(['sensor', 'relay', 'actuator', 'rover', 'robot', 'robotics'])) addSkill('Robotics');
        return skills;
      };
      const extractAnalysisTerms = (text = '') => {
        const mappedSkills = parseSkillsFromText(text);
        if (mappedSkills.length) return mappedSkills;
        const stopWords = new Set(['about', 'and', 'are', 'candidate', 'description', 'experience', 'for', 'from', 'have', 'job', 'looking', 'must', 'requirements', 'role', 'skills', 'that', 'the', 'this', 'with', 'work', 'years', 'your']);
        return [...new Set((text.toLowerCase().match(/[a-z][a-z0-9+#.-]{2,}/g) || []).filter(word => !stopWords.has(word)))].slice(0, 12);
      };
      const semanticCategories = (skill = '') => {
        const normalized = skill.toLowerCase();
        const categories = new Set();
        if (['arduino', 'microcontrollers', 'embedded systems', 'firmware engineering', 'circuit simulation'].includes(normalized)) categories.add('embedded');
        if (['sensors', 'relays & actuators', 'internet of things (iot)'].includes(normalized)) categories.add('iot');
        if (['sensors', 'relays & actuators', 'robotics'].includes(normalized)) categories.add('robotics');
        return categories;
      };

      const skillsContextuallyMatch = (jobSkill, resumeSkill) => {
        if (jobSkill.toLowerCase() === resumeSkill.toLowerCase()) return true;
        const jobCategories = semanticCategories(jobSkill);
        const resumeCategories = semanticCategories(resumeSkill);
        return [...jobCategories].some(category => resumeCategories.has(category));
      };
      const showToast = (message) => {
        setToast(message);
        window.setTimeout(() => setToast(''), 3200);
      };

      const useGuestDemo = () => {
        setIsGuest(true);
        setUploadedFileName('guest-frontend-resume.txt');

        const profileText = `${projectTitle} ${projectTech}`.toLowerCase();
        const hasAny = (terms) => terms.some(term => profileText.includes(term));
        const concepts = new Set(parseSkillsFromText(projectTech));
        if (hasAny(['arduino', 'microcontroller', 'esp32', 'raspberry pi pico', 'wokwi', 'tinkercad', 'circuit simulation', 'firmware', 'embedded'])) {
          concepts.add('Embedded Systems'); concepts.add('Firmware Engineering');
        }
        if (hasAny(['sensor', 'relay', 'automation hardware', 'actuator', 'smart home', 'iot'])) concepts.add('Internet of Things (IoT)');
        if (hasAny(['sensor', 'relay', 'rover', 'robot', 'automation hardware', 'actuator'])) concepts.add('Robotics');
        if (hasAny(['c++', 'c/c++', 'arduino ide'])) concepts.add('C++');
        if (hasAny(['python'])) concepts.add('Python');

        const jobs = [
          { job_id: 'JOB_001', job_title: 'Embedded Firmware Engineer', required_skills: ['Embedded Systems', 'Firmware Engineering', 'C++'] },
          { job_id: 'JOB_002', job_title: 'IoT Prototype Engineer', required_skills: ['Internet of Things (IoT)', 'Embedded Systems', 'Python'] },
          { job_id: 'JOB_003', job_title: 'Robotics Systems Engineer', required_skills: ['Robotics', 'Embedded Systems', 'Firmware Engineering'] },
          { job_id: 'JOB_004', job_title: 'IT Support Administrator', required_skills: ['Windows', 'Help Desk', 'Active Directory'], excluded: true }
        ];
        const hasProjectEvidence = hasAny(['built', 'prototype', 'rover', 'automation', 'smart ', 'simulat', 'project']);
        setIsJobMatching(true);
        window.setTimeout(() => {
          const opportunities = jobs.filter(job => !job.excluded).map(job => {
            const matched = job.required_skills.filter(skill => concepts.has(skill));
            const coverage = matched.length / job.required_skills.length;
            const match_percentage = Math.round(coverage * 85 + (hasProjectEvidence ? 15 : 0));
            return {
              job_id: job.job_id,
              job_title: job.job_title,
              match_percentage,
              targeting_reason: `Semantic alignment: ${matched.join(', ')}${hasProjectEvidence ? ' plus hands-on project evidence' : ''} maps directly to this role's hardware-software requirements.`
            };
          }).filter(job => job.match_percentage >= 80).sort((a, b) => b.match_percentage - a.match_percentage).slice(0, 2);
          setJobMatches({ opportunities });
          setIsJobMatching(false);
        }, 450);
      };      const introLogoRef = useRef(null);
      const dashboardContainerRef = useRef(null);
      const pipelineRef = useRef(null);
      const scoreRef = useRef(null);

      // Intro animation sequencer
      useEffect(() => {
        const tl = gsap.timeline({
          onComplete: () => {
            setIsIntroComplete(true);
            // Trigger dashboard entrance stagger
            gsap.fromTo(".stagger-card", 
              { opacity: 0, y: 24 }, 
              { opacity: 1, y: 0, duration: 0.8, stagger: 0.08, ease: "power4.out" }
            );
          }
        });

        // 1. Initial logo glow/breathing
        tl.to(introLogoRef.current, {
          scale: 1.05,
          rotate: 2,
          duration: 1.2,
          yoyo: true,
          repeat: 1,
          ease: "sine.inOut"
        });

        // 2. Shrink logo slightly before expanding (Google Classroom style)
        tl.to(introLogoRef.current, {
          scale: 0.9,
          duration: 0.3,
          ease: "power2.out"
        });

        // 3. Expand intro logo to cover space & fade out intro screen
        tl.to(introScreenRef.current, {
          clipPath: "circle(0% at 50% 50%)",
          duration: 0.9,
          ease: "power4.inOut"
        });

        // 4. Reveal dashboard
        tl.fromTo(dashboardContainerRef.current, {
          opacity: 0,
          scale: 0.96,
        }, {
          opacity: 1,
          scale: 1,
          duration: 0.8,
          ease: "power3.out"

      }, []);

      // Trigger Lucide icons parser when UI changes
      useEffect(() => {
        if (typeof lucide !== 'undefined') {
          window.setTimeout(() => lucide.createIcons(), 50);
        }
      }, [scanProgress, isIntroComplete, matchedSkills, missingSkills, activeStation, jobMatches]);

      // Toggle Theme helper
      useEffect(() => {
        document.documentElement.classList.toggle('dark', isDarkTheme);
        document.body.classList.toggle('light-theme', !isDarkTheme);
        localStorage.setItem('resugo-theme', isDarkTheme ? 'dark' : 'light');
      }, [isDarkTheme]);

      const toggleTheme = () => setIsDarkTheme(currentTheme => !currentTheme);

      // Simulated pipeline stations
      const stations = [
        { name: "Resume Parsing", icon: "file-text" },
        { name: "OCR Check", icon: "scan" },
        { name: "Skill Extraction", icon: "cpu" },
        { name: "AI Suggestions", icon: "brain" },
        { name: "Job Match", icon: "target" }
      ];

      // Read resume and job-description files without leaving the form in a broken state.
      const extractTextFromFile = async (file) => {
        const maxFileSize = 10 * 1024 * 1024;
        if (!file) throw new Error('No file was selected.');
        if (file.size > maxFileSize) throw new Error('Choose a file smaller than 10 MB.');
        if (file.type.startsWith('text/') || /\.(txt|md|csv)$/i.test(file.name)) return (await file.text()).trim();
        if (file.type === 'application/pdf' || /\.pdf$/i.test(file.name)) {
          if (!window.pdfjsLib) throw new Error('PDF reading is unavailable. Paste the text instead.');
          pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';
          const pdf = await pdfjsLib.getDocument({ data: new Uint8Array(await file.arrayBuffer()) }).promise;
          const pages = await Promise.all(Array.from({ length: pdf.numPages }, async (_, index) => {
            const page = await pdf.getPage(index + 1);
            const text = await page.getTextContent();
            return text.items.map(item => item.str).join(' ');
          }));
          return pages.join(' ').trim();
        }
        throw new Error('Use a PDF, TXT, Markdown, or CSV file.');
      };

      const handleFileDrop = async (e, target = 'resume') => {
        e.preventDefault();
        setDragging(false);
        const files = e.dataTransfer ? e.dataTransfer.files : e.target.files;
        const file = files && files[0];
        if (!file) return;
        try {
          const text = await extractTextFromFile(file);
          if (!text) throw new Error('No readable text was found in this file.');
          if (target === 'job') {
            setUploadedJobFileName(file.name);
            setJobDescription(text);
            showToast('Job description uploaded. Review it, then start the analysis.');

            setUploadedFileName(file.name);
            setResumeText(text);
            showToast('Resume uploaded. Review it, then start the analysis.');
          }
        } catch (error) {
          const message = error instanceof Error ? error.message : 'The file could not be read.';
          showToast(`${target === 'job' ? 'Job description' : 'Resume'} upload failed: ${message}`);
        } finally {
          if (e.target && e.target.value !== undefined) e.target.value = '';
        }
      };
      // Main Scanning Orchestrator
      const startPipelineScanning = () => {
        const jobSkills = extractAnalysisTerms(jobDescription);
        const resumeSkills = extractAnalysisTerms(resumeText);
        if (!resumeSkills.length) {
          showToast('Add readable resume text or upload a supported file before starting the analysis.');

          return;
        }

        const matched = jobSkills.filter(jobSkill => resumeSkills.some(resumeSkill => skillsContextuallyMatch(jobSkill, resumeSkill)));
        const missing = jobSkills.filter(jobSkill => !resumeSkills.some(resumeSkill => skillsContextuallyMatch(jobSkill, resumeSkill)));
        const matchPct = Math.round((matched.length / jobSkills.length) * 100);
        // Apply the calculated score in the same state update cycle. The previous nested
        // interval left the dashboard showing "--" for several seconds and could leave it stale.
        setMatchedSkills(matched);
        setMissingSkills(missing);
        setSelectedSkill('');
        setActiveStation(stations.length - 1);
        setAnalysisResult({ matchPercentage: matchPct, matchedCount: matched.length, targetCount: jobSkills.length });
        setFinalScore(matchPct);
        setScanProgress(2);
        triggerConfetti();
        showToast(`Compatibility analysis complete: ${matchPct}% match.`);
      };
      // Confetti generation
      const triggerConfetti = () => {
        const particles = [];

        for (let i = 0; i < 45; i++) {
          particles.push({
            id: i,
            color: colors[Math.floor(Math.random() * colors.length)],
            left: 20 + Math.random() * 60 + '%',
            delay: Math.random() * 0.4 + 's',
            scale: Math.random() * 0.8 + 0.4
          });
        }
        setConfetti(particles);
      };

          x: x * 0.45,
          y: y * 0.45,
          duration: 0.3,
          ease: "power2.out"
        });
      };

          duration: 0.5,

          {!isIntroComplete && (
            <div 
              ref={introScreenRef} 
              className="fixed inset-0 z-[999] bg-[#09090B] flex flex-col items-center justify-center pointer-events-none"
              style={{ clipPath: "circle(100% at 50% 50%)" }}
            >
              {/* Pulsing Glowing Logo Container */}
              <div 
                ref={introLogoRef}
                className="relative w-44 h-44 md:w-56 md:h-56 flex items-center justify-center rounded-full dark-shadow-glow"
              >
                <img 
                  src="logo.jpg" 
                  alt="ResuGO Logo" 
                  className="w-full h-full object-cover rounded-full border-2 border-primary/45" 
                />
                {/* Rotating Gradient Ring */}
                <div className="absolute inset-[-6px] rounded-full border border-dashed border-accent/60 animate-[spin_10s_linear_infinite]"></div>
                {/* Floating particle animations */}
                <div className="absolute inset-[-14px] rounded-full border border-dotted border-secondary/30 animate-[spin_16s_linear_infinite_reverse]"></div>
              </div>
              <h1 className="mt-8 text-2xl font-bold font-grotesk tracking-wider text-slate-200">
                Resu<span className="text-accent">GO</span>
              </h1>
            </div>
          )}

          {/* â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â• DASHBOARD MAIN CONTAINER â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â• */}

                    </label>
                  </div>
                  {jobMatches && <div className="mt-5 grid grid-cols-1 md:grid-cols-2 gap-4">{jobMatches.opportunities.length ? jobMatches.opportunities.map(job => <div key={job.job_id} className="rounded-xl border border-success/30 bg-success/5 p-5"><div className="flex items-start justify-between gap-3"><div><div className="text-base font-bold font-grotesk text-slate-100">{job.job_title}</div><div className="mt-1 text-xs text-slate-400">{job.job_id}</div></div><span className="rounded-lg border border-success/25 bg-success/10 px-2 py-1 text-xs font-bold text-success">{job.match_percentage}%</span></div><p className="mt-3 text-sm text-slate-300">{job.targeting_reason}</p><button className="mt-4 rounded-lg bg-success px-3 py-2 text-xs font-bold text-black">Apply Instantly</button></div>) : <div className="rounded-xl border border-cardBorder bg-black/20 p-5 text-sm text-slate-400">No roles cleared the 80% contextual-match threshold. Add concrete project technologies or outcomes.</div>}</div>}
                </section>
                <div className="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-6">
                  {/* Resume score comes only from the completed skill comparison. */}
                  <div className="glass-card stagger-card p-6 rounded-2xl flex items-center justify-between gap-4">
                    <div className="flex items-center gap-4">
                      <div className="w-16 h-16 rounded-full border border-cardBorder water-wave-container flex-shrink-0 bg-black/40">
                        <div className="water-fill" style={{ height: `${hasCompletedAnalysis ? displayedScore : 0}%` }}>
                          <div className="water-wave water-wave-1"></div>
                          <div className="water-wave water-wave-2"></div>
                        </div>
                        <div className="absolute inset-0 flex items-center justify-center">
                          <span className="text-xs font-bold font-grotesk text-slate-200">{hasCompletedAnalysis ? `${displayedScore}%` : '--'}</span>
                        </div>
                      </div>
                      <div>
                        <div className="text-xs text-slate-400 font-semibold font-grotesk">Resume Match Score</div>
                        <div className="text-2xl font-bold font-grotesk text-accent mt-0.5">{hasCompletedAnalysis ? `${displayedScore}%` : '--'}</div>
                        <div className="text-[10px] text-slate-500 mt-1">{hasCompletedAnalysis ? 'Based on matched job skills' : 'Analyze resume to unlock'}</div>
                      </div>
                    </div>
                  </div>

                  {/* ATS score only unlocks after a completed resume analysis. */}
                  <button
                    type="button"
                    onClick={() => hasResume ? navigateTo('Resumes') : showToast('Upload a resume first to unlock ATS scoring.')}
                    className={`glass-card stagger-card p-6 rounded-2xl flex items-center justify-between text-left ${hasResume ? 'cursor-pointer' : 'opacity-55 cursor-not-allowed'}`}
                  >
                    <div>
                      <div className="text-xs text-slate-400 font-semibold font-grotesk">ATS Score</div>
                      <div className="text-3xl font-bold font-grotesk text-accent mt-1">{atsScore === null ? '--' : atsScore}</div>
                      <div className="text-[10px] text-slate-500 mt-1">{hasCompletedAnalysis ? 'Based on your resume' : 'Upload resume to unlock'}</div>
                    </div>
                    <div className="w-10 h-10 rounded-xl bg-primary/10 flex items-center justify-center text-primary border border-primary/20">
                      <i data-lucide={hasResume ? 'gauge' : 'lock'} className="w-5 h-5"></i>
                    </div>
                  </button>

                  {/* Job search matching also requires a resume. */}
                  <button
                    type="button"
                    onClick={() => hasResume ? navigateTo('Jobs') : showToast('Upload a resume first to unlock job matching.')}
                    className={`glass-card stagger-card p-6 rounded-2xl flex items-center justify-between text-left ${hasResume ? 'cursor-pointer' : 'opacity-55 cursor-not-allowed'}`}
                  >
                    <div>
                      <div className="text-xs text-slate-400 font-semibold font-grotesk">Job Search Match</div>
                      <div className="text-3xl font-bold font-grotesk text-accent mt-1">{hasCompletedAnalysis ? `${displayedScore}%` : '--'}</div>
                      <div className="text-[10px] text-slate-500 mt-1">{hasCompletedAnalysis ? 'Based on target job' : 'Upload resume to unlock'}</div>
                    </div>
                    <div className="w-10 h-10 rounded-xl bg-secondary/10 flex items-center justify-center text-secondary border border-secondary/20">
                      <i data-lucide={hasResume ? 'target' : 'lock'} className="w-5 h-5"></i>
                    </div>
                  </button>

                  {/* Metric: Applications */}
                  <div className="glass-card stagger-card p-6 rounded-2xl flex items-center justify-between">
                    <div>
                      <div className="text-xs text-slate-400 font-semibold font-grotesk">Applications</div>
                      <div className="text-3xl font-bold font-grotesk text-accent mt-1">12 <span className="text-sm font-normal text-success">â†‘</span></div>
                    </div>
                    <div className="w-10 h-10 rounded-xl bg-accent/10 flex items-center justify-center text-accent border border-accent/20">
                      <i data-lucide="briefcase" className="w-5 h-5"></i>
                    </div>
                  </div>
                </div>

                {/* 3. Missing & Matched Skills Section */}
                <div className="grid grid-cols-1 md:grid-cols-2 gap-6">
                  {/* Missing Skills Card */}
                  <div id="skills-summary" className="glass-card stagger-card p-6 rounded-2xl border-l-4 border-danger/80">
                    <h3 className="text-sm font-bold font-grotesk text-danger uppercase tracking-wider mb-4 flex items-center gap-2">
                      <i data-lucide="alert-circle" className="w-4 h-4"></i> Missing Skills
                      {scanProgress === 0 && <span className="text-[9px] font-normal text-slate-500 normal-case tracking-normal ml-1">â€” run analysis to populate</span>}
                    </h3>
                    <div className="flex flex-wrap gap-3">
                      {(hasCompletedAnalysis ? missingSkills : []).map(skill => (
                        <span 
                          key={skill}
                          onClick={() => { setSelectedSkill(skill); document.getElementById(`resources-${skill}`)?.scrollIntoView({ behavior: `smooth`, block: `center` }); }} className="px-3.5 py-1.5 rounded-lg text-xs font-semibold bg-danger/10 text-danger border border-danger/25 hover:shadow-[0_0_12px_rgba(239,68,68,0.2)] transition-shadow cursor-pointer"
                        >
                          {skill}
                        </span>
                      ))}
                      {hasCompletedAnalysis && missingSkills.length === 0 && (
                        <span className="text-xs text-slate-500 italic">No gaps detected â€” great profile match!</span>
                      )}
                    </div>
                  </div>

                  {/* Matched Skills Card */}
                  <div className="glass-card stagger-card p-6 rounded-2xl border-l-4 border-success/80">
                    <h3 className="text-sm font-bold font-grotesk text-success uppercase tracking-wider mb-4 flex items-center gap-2">
                      <i data-lucide="check-circle-2" className="w-4 h-4"></i> Matched Skills
                      {scanProgress === 0 && <span className="text-[9px] font-normal text-slate-500 normal-case tracking-normal ml-1">â€” run analysis to populate</span>}
                    </h3>
                    <div className="flex flex-wrap gap-3">
                      {(hasCompletedAnalysis ? matchedSkills : []).map(skill => (
                        <span 
                          key={skill}
                          onClick={() => showToast(`${skill} is already matched in this analysis.`)} className="px-3.5 py-1.5 rounded-lg text-xs font-semibold bg-success/10 text-success border border-success/25 hover:shadow-[0_0_12px_rgba(34,197,94,0.2)] transition-shadow cursor-pointer"
                        >
                          {skill}
                        </span>
                      ))}
                      {hasCompletedAnalysis && matchedSkills.length === 0 && (
                        <span className="text-xs text-slate-500 italic">No matching skills found â€” consider adding more to your resume.</span>
                      )}
                    </div>
                  </div>
                </div>

                {/* How it works roadmap */}
                <section className="glass-card stagger-card p-6 rounded-2xl" aria-labelledby="how-it-works-title">
                  <div className="flex items-start justify-between gap-4 mb-6">
                    <div>
                      <div className="text-xs font-bold font-grotesk uppercase tracking-widest text-primary mb-1">How ResuGO works</div>
                      <h3 id="how-it-works-title" className="text-xl font-bold font-grotesk text-slate-100">From resume to your next best move</h3>
                      <p className="text-sm text-slate-400 mt-1">Use this four-step roadmap to understand exactly what the dashboard does.</p>
                    </div>
                    <i data-lucide="route" className="w-6 h-6 text-accent flex-shrink-0"></i>
                  </div>
                  <div className="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-4">
                    {[
                      ['1', 'Add your resume', 'Upload a PDF or paste your resume text so we can identify your skills.'],
                      ['2', 'Add a target job', 'Paste the job description you want to apply for.'],
                      ['3', 'Run the analysis', 'ResuGO calculates ATS, job-match, matched, and missing skills.'],
                      ['4', 'Close the gaps', 'Use the tailored free resources to strengthen your next application.'],
                    ].map(([number, title, description]) => (
                      <div key={number} className="rounded-xl border border-cardBorder bg-black/20 p-4">
                        <span className="inline-flex w-7 h-7 items-center justify-center rounded-lg bg-accent/10 text-accent text-xs font-bold">{number}</span>
                        <h4 className="mt-3 text-sm font-bold text-slate-200">{title}</h4>
                        <p className="mt-1 text-xs leading-5 text-slate-500">{description}</p>
                      </div>
                    ))}
                  </div>
                </section>
                {/* 4. Resume Scanner Water Pipeline Component */}
                <div id="resume-scanner" className="glass-card stagger-card p-8 rounded-2xl relative overflow-hidden">
                  <div className="flex items-center justify-between mb-6">
                    <div>
                      <h3 className="text-lg font-bold font-grotesk text-slate-100 flex items-center gap-2">
                        <i data-lucide="scan" className="w-5 h-5 text-accent animate-pulse"></i> Resume Analysis Pipeline
                      </h3>
                      <p className="text-xs text-slate-400 mt-0.5">Upload your resume to watch our dynamic verification scanner analyze compatibility.</p>
                    </div>

                    {scanProgress === 2 && (
                      <button 
                        onClick={() => {
                          setScanProgress(0);
                          setAnalysisResult(null);
                          setFinalScore(0);
                          setUploadedFileName('');
                          setUploadedJobFileName('');
                          setJobDescription('');
                          setResumeText('');
                          setMatchedSkills([]);
                          setMissingSkills([]);
                        }}
                        className="px-3 py-1.5 text-xs rounded-xl bg-white/5 hover:bg-white/10 text-slate-300 hover:text-white border border-cardBorder transition-all"
                      >
                        Reset Scanner
                      </button>
                    )}
                  </div>

                  {/* UPLOADER INTERFACE */}
                  {scanProgress === 0 && (
                    <div className="space-y-6">
                      <div className="grid grid-cols-1 md:grid-cols-2 gap-6">
                        {/* Left Column: PDF Dropzone */}
                        <div 
                          onDragOver={(e) => { e.preventDefault(); setDragging(true); }}
                          onDragLeave={() => setDragging(false)}
                          onDrop={handleFileDrop}
                          className={`border border-dashed rounded-xl p-8 text-center transition-all duration-300 flex flex-col items-center justify-center min-h-[220px] ${
                            dragging ? 'border-accent bg-accent/5' : 'border-cardBorder bg-black/10'
                          }`}
                        >
                          <input 
                            type="file" 
                            id="resume-file" 
                            className="hidden" 
                            accept=".pdf,.txt,.md" 
                            onChange={handleFileDrop}
                          />
                          <label 
                            htmlFor="resume-file"
                            className="flex flex-col items-center justify-center cursor-pointer group w-full"
                          >
                            <div className="w-14 h-14 rounded-full bg-primary/10 border border-primary/20 flex items-center justify-center text-primary group-hover:scale-105 transition-transform mb-3">
                              <i data-lucide="upload-cloud" className="w-7 h-7"></i>
                            </div>
                            {uploadedFileName ? (
                              <div className="text-center">
                                <span className="text-sm font-semibold text-accent block truncate max-w-[200px] mx-auto">{uploadedFileName}</span>
                                <span className="text-xs text-slate-500 mt-1 block">Click to replace file</span>
                              </div>
                            ) : (
                              <div>
                                <span className="text-sm font-semibold text-slate-200 block">Drag & drop your resume here</span>
                                <span className="text-xs text-slate-500 mt-1 block">or click to browse from files</span>
                              </div>
                            )}
                          </label>
                        </div>

                        {/* Right Column: Job Description Textarea */}
                        <div id="job-description" className="flex flex-col min-h-[220px]">
                          <input type="file" id="job-description-file" className="hidden" accept=".pdf,.txt,.md,.csv" onChange={(e) => handleFileDrop(e, 'job')} />
                          <label htmlFor="job-description-file" className="mb-2 inline-flex w-fit cursor-pointer items-center gap-2 rounded-lg border border-cardBorder bg-black/15 px-3 py-2 text-xs font-semibold text-slate-300 hover:border-accent/50 hover:text-accent">
                            <i data-lucide="file-up" className="w-3.5 h-3.5"></i>
                            {uploadedJobFileName ? `Replace job file: ${uploadedJobFileName}` : 'Upload job description file'}
                          </label>
                          <textarea
                            value={jobDescription}
                            onChange={(e) => setJobDescription(e.target.value)}
                            placeholder="Paste the target job description or requirements here... (e.g. Senior Frontend Developer with 5+ years of React, Tailwind CSS, TypeScript...)"
                            className="w-full flex-1 p-5 rounded-xl border border-cardBorder bg-black/15 placeholder-slate-500 text-slate-100 text-sm focus:outline-none focus:border-accent/40 focus:ring-1 focus:ring-accent/40 resize-none transition-all"
                          />
                          <textarea
                            value={resumeText}
                            onChange={(e) => setResumeText(e.target.value)}
                            placeholder="Paste your resume text or skills here. This is required for accurate skill matching, especially for PDF files."
                            className="w-full min-h-[105px] mt-4 p-4 rounded-xl border border-cardBorder bg-black/15 placeholder-slate-500 text-slate-100 text-sm focus:outline-none focus:border-accent/40 focus:ring-1 focus:ring-accent/40 resize-y transition-all"
                          />
                        </div>
                      </div>

                      {/* Start Scanning Trigger Button */}
                      <div className="flex justify-end pt-2">
                        <button
                          disabled={!jobDescription.trim() || !resumeText.trim()}
                          onClick={startPipelineScanning}
                          className="px-6 py-3.5 rounded-xl bg-gradient-to-r from-primary to-accent text-white font-semibold font-grotesk text-sm hover:shadow-[0_0_20px_rgba(91,95,239,0.3)] disabled:opacity-40 disabled:cursor-not-allowed transition-all hover:scale-[1.02] cursor-pointer"
                        >
                          Start Compatibility Analysis âœ¦
                        </button>
                      </div>
                    </div>
                  )}

                  {/* LIQUID WATER PIPELINE ANIMATOR */}
                  {scanProgress > 0 && (
                    <div className="relative py-8">
                      <div className="flex flex-col lg:flex-row items-center justify-between gap-8 relative z-10">
                        
                        {/* Start Node: Glowing PDF File */}
                        <div className="flex flex-col items-center flex-shrink-0">
                          <div className="w-14 h-18 bg-primary/10 border border-primary/30 rounded-lg p-2.5 flex flex-col justify-between items-center relative dark-shadow-glow">
                            <i data-lucide="file-text" className="w-7 h-7 text-accent"></i>
                            <span className="text-[9px] font-bold text-slate-400 mt-1 truncate max-w-[60px]">{uploadedFileName || "Resume"}</span>
                          </div>
                          <span className="text-[10px] text-slate-500 mt-2 font-medium">Uploaded PDF</span>
                        </div>

                        {/* Flow Pipeline Pipe */}
                        <div className="flex-1 w-2 h-48 lg:w-auto lg:h-4 bg-black/50 border border-cardBorder rounded-full relative overflow-hidden flex items-center">
                          {scanProgress === 1 && (
                            <div className="pipe-fluid absolute left-0 top-0 h-full rounded-full transition-all duration-500" style={{ width: `${(activeStation + 1) * 20}%` }}></div>
                          )}
                          {scanProgress === 2 && (
                            <div className="absolute left-0 top-0 h-full rounded-full bg-success/40" style={{ width: '100%' }}></div>
                          )}
                        </div>

                        {/* Middle stations */}
                        <div className="flex flex-col lg:flex-row gap-6 items-center flex-grow justify-around w-full">
                          {stations.map((st, index) => {
                            const isCompleted = index < activeStation || scanProgress === 2;
                            const isActive = index === activeStation && scanProgress === 1;
                            
                            return (
                              <div key={st.name} className="flex flex-col items-center text-center">
                                <div className={`w-12 h-12 rounded-full flex items-center justify-center border transition-all duration-500 ${
                                  isCompleted 
                                    ? 'bg-success/15 border-success text-success shadow-[0_0_12px_rgba(34,197,94,0.35)]' 
                                    : isActive 
                                      ? 'bg-primary/25 border-accent text-accent shadow-[0_0_12px_rgba(34,211,238,0.5)] animate-pulse' 
                                      : 'bg-black/40 border-cardBorder text-slate-600'
                                }`}>
                                  {isCompleted ? (
                                    <i data-lucide="check" className="w-5 h-5"></i>
                                  ) : (
                                    <i data-lucide={st.icon} className="w-5 h-5"></i>
                                  )}
                                </div>
                                <span className={`text-[10px] mt-2 font-bold font-grotesk tracking-wide ${
                                  isCompleted ? 'text-success' : isActive ? 'text-accent' : 'text-slate-500'
                                }`}>
                                  {st.name}
                                </span>
                              </div>
                            );
                          })}
                        </div>

                        {/* Pipe connection */}
                        <div className="flex-1 w-2 h-12 lg:w-auto lg:h-4 bg-black/50 border border-cardBorder rounded-full relative overflow-hidden flex items-center">
                          {scanProgress === 2 && (
                            <div className="absolute left-0 top-0 h-full rounded-full bg-success/40" style={{ width: '100%' }}></div>
                          )}
                        </div>

                        {/* End Node: Beaker Beaker Score Tank */}
                        <div className="flex flex-col items-center flex-shrink-0 relative">
                          <div className="w-24 h-32 border border-cardBorder water-wave-beaker flex-shrink-0 bg-black/40 flex flex-col justify-end relative shadow-[inset_0_4px_16px_rgba(255,255,255,0.03)]">
                            {/* Water liquid filler */}
                            <div className="water-fill" style={{ height: `${displayedScore}%` }}>
                              <div className="water-wave water-wave-1"></div>
                              <div className="water-wave water-wave-2"></div>
                            </div>
                            <div className="absolute inset-0 flex items-center justify-center flex-col z-20">
                              <span className="text-xl font-bold font-grotesk text-slate-100">{displayedScore}%</span>
                              <span className="text-[9px] text-slate-400 mt-0.5">COMPATIBLE</span>
                            </div>

                            {/* Confetti container inside Beaker */}
                            {scanProgress === 2 && confetti.length > 0 && (
                              <div className="absolute inset-0 overflow-hidden pointer-events-none">
                                {confetti.map(p => (
                                  <div 
                                    key={p.id} 
                                    className="confetti-particle" 
                                    style={{
                                      backgroundColor: p.color,
                                      left: p.left,
                                      animationDelay: p.delay,
                                      transform: `scale(${p.scale})`
                                    }}
                                  ></div>
                                ))}
                              </div>
                            )}
                          </div>
                          
                          {/* Checked Completed Mark */}
                          {scanProgress === 2 && confetti.length > 0 && (
                            <div className="absolute top-[-10px] right-[-10px] w-7 h-7 rounded-full bg-success flex items-center justify-center text-white border border-[#09090B] shadow-[0_0_12px_rgba(34,197,94,0.4)] animate-[bounce_0.6s_ease-out]">
                              <i data-lucide="check" className="w-4 h-4"></i>
                            </div>
                          )}

                          <span className="text-[10px] text-slate-500 mt-3 font-semibold">Glass Beaker Score</span>
                        </div>

                      </div>
                    </div>
                  )}
                </div>

                {/* 5. Custom SVG Charts Section (Radar Chart & Area Chart) */}
                <div className="grid grid-cols-1 md:grid-cols-2 gap-8">
                  {/* Custom Radar Chart Card */}
                  <div className="glass-card stagger-card p-6 rounded-2xl">
                    <div className="flex items-center justify-between mb-4">
                      <h4 className="text-sm font-bold font-grotesk uppercase tracking-wider text-slate-300">Radar Chart</h4>
                      <i data-lucide="info" className="w-4 h-4 text-slate-500"></i>
                    </div>
                    {/* SVG Radar implementation */}
                    <div className="w-full h-64 flex items-center justify-center bg-black/20 rounded-xl relative">
                      <svg width="220" height="220" viewBox="0 0 200 200" className="overflow-visible">
                        {/* Radar grid borders */}
                        {[40, 70, 100].map((r, i) => (
                          <polygon 
                            key={i}
                            points="100,20 176,75 147,165 53,165 24,75" 
                            fill="none" 
                            stroke="rgba(255, 255, 255, 0.05)" 
                            strokeWidth="1"
                            transform={`translate(${100 - r}, ${100 - r}) scale(${r / 100})`}
                          />
                        ))}
                        {/* Axes lines */}
                        <line x1="100" y1="100" x2="100" y2="20" stroke="rgba(255, 255, 255, 0.08)" strokeDasharray="3" />
                        <line x1="100" y1="100" x2="176" y2="75" stroke="rgba(255, 255, 255, 0.08)" strokeDasharray="3" />
                        <line x1="100" y1="100" x2="147" y2="165" stroke="rgba(255, 255, 255, 0.08)" strokeDasharray="3" />
                        <line x1="100" y1="100" x2="53" y2="165" stroke="rgba(255, 255, 255, 0.08)" strokeDasharray="3" />
                        <line x1="100" y1="100" x2="24" y2="75" stroke="rgba(255, 255, 255, 0.08)" strokeDasharray="3" />
                        
                        {/* Analysis values are calculated from the uploaded resume and target job. */}
                        {hasCompletedAnalysis && (
                          <polygon points={radarPoints} fill="rgba(34, 211, 238, 0.12)" stroke="#22D3EE" strokeWidth="2" className="animate-[pulse_3s_infinite]" />
                        )}
                        <polygon points={targetRadarPoints} fill="none" stroke="#5B5FEF" strokeWidth="1.5" strokeDasharray="4" />

                        {/* Node labels */}
                        <text x="100" y="12" fill="#94A3B8" fontSize="8" textAnchor="middle">Job match</text>
                        <text x="186" y="78" fill="#94A3B8" fontSize="8" textAnchor="start">ATS</text>
                        <text x="157" y="177" fill="#94A3B8" fontSize="8" textAnchor="start">Coverage</text>
                        <text x="43" y="177" fill="#94A3B8" fontSize="8" textAnchor="end">Skills</text>
                        <text x="14" y="78" fill="#94A3B8" fontSize="8" textAnchor="end">Readiness</text>
                        {!hasCompletedAnalysis && <text x="100" y="105" fill="#64748B" fontSize="9" textAnchor="middle">Complete an analysis to view results</text>}
                      </svg>

                      {/* Legend */}
                      <div className="absolute bottom-4 left-4 right-4 flex justify-between text-[9px] text-slate-400 px-2">
                        <div className="flex items-center gap-1.5">
                          <span className="w-2.5 h-0.5 border-t-2 border-dashed border-primary"></span>
                          <span>Job target requirements</span>
                        </div>
                        <div className="flex items-center gap-1.5">
                          <span className="w-2.5 h-2.5 rounded-full bg-accent/25 border border-accent"></span>
                          <span>Your profile score</span>
                        </div>
                      </div>
                    </div>
                  </div>

                  {/* Custom Area Chart Card */}
                  <div className="glass-card stagger-card p-6 rounded-2xl">
                    <div className="flex items-center justify-between mb-4">
                      <h4 className="text-sm font-bold font-grotesk uppercase tracking-wider text-slate-300">Resume Analysis Progress</h4>
                      <i data-lucide="info" className="w-4 h-4 text-slate-500"></i>
                    </div>
                    {/* SVG Line/Area implementation */}
                    <div className="w-full h-64 flex items-center justify-center bg-black/20 rounded-xl p-4 relative">
                      <svg width="100%" height="100%" viewBox="0 0 400 200" preserveAspectRatio="none" className="overflow-visible">
                        {/* Definitions for gradient fills */}
                        <defs>
                          <linearGradient id="chartGlow" x1="0" y1="0" x2="0" y2="1">
                            <stop offset="0%" stopColor="#22D3EE" stopOpacity="0.3" />
                            <stop offset="100%" stopColor="#5B5FEF" stopOpacity="0.0" />
                          </linearGradient>
                        </defs>
                        {/* Grid lines */}
                        <line x1="0" y1="50" x2="400" y2="50" stroke="rgba(255, 255, 255, 0.03)" strokeWidth="1" />
                        <line x1="0" y1="100" x2="400" y2="100" stroke="rgba(255, 255, 255, 0.03)" strokeWidth="1" />
                        <line x1="0" y1="150" x2="400" y2="150" stroke="rgba(255, 255, 255, 0.03)" strokeWidth="1" />

                        {/* Values progress from resume parsing to the final job match. */}
                        {hasCompletedAnalysis && <polygon points={`${performanceLinePoints} 400,200 0,200`} fill="url(#chartGlow)" />}
                        {hasCompletedAnalysis && <polyline points={performanceLinePoints} fill="none" stroke="#22D3EE" strokeWidth="3.5" />}
                        {performanceValues.map((value, index) => {
                          const x = index * 400 / 3;
                          const y = 190 - value * 1.65;
                          return <circle key={index} cx={x} cy={y} r="4.5" fill={index === 3 ? '#22D3EE' : '#5B5FEF'} stroke="#fff" strokeWidth="1.5" />;
                        })}
                        {!hasCompletedAnalysis && <text x="200" y="104" fill="#64748B" fontSize="11" textAnchor="middle">Upload and analyze a resume to view progress</text>}
                      </svg>

                      {/* Timeline Indicators */}
                      <div className="absolute bottom-2 left-6 right-6 flex justify-between text-[9px] text-slate-500">
                        <span>Jan</span>
                        <span>Mar</span>
                        <span>May</span>
                        <span>Jul</span>
                        <span>Sep</span>
                      </div>
                    </div>
                  </div>
                </div>

                {/* 6. Free Resources Section (shows after scan OR always with defaults) */}
                <div className="stagger-card">
                  <div className="flex items-center justify-between mb-5">
                    <div>
                      <div className="text-xs font-bold font-grotesk uppercase tracking-widest text-primary mb-1">Free Learning Resources</div>
                      <h3 className="text-xl font-bold font-grotesk text-slate-100">
                        Curated for Your <span className="text-accent">Skill Gaps</span>
                      </h3>
                      <p className="text-xs text-slate-400 mt-1">
                        {missingSkills.length > 0
                          ? `${missingSkills.length} missing skill${missingSkills.length > 1 ? 's' : ''} detected. Here are the best free resources to close each gap:`
                          : 'Paste your job description and run an analysis to get personalized resources. Showing popular picks meanwhile.'}
                      </p>
                    </div>
                    <div className="hidden md:flex items-center gap-2 px-3.5 py-2 rounded-xl border border-success/25 bg-success/5 text-success text-xs font-semibold">
                      <i data-lucide="sparkles" className="w-4 h-4"></i>
                      100% Free
                    </div>
                  </div>

                  <div className="space-y-6">
                    {(missingSkills.length > 0 ? missingSkills : ['Docker', 'Kubernetes', 'AWS']).map((skill, si) => {
                      const resources = RESOURCE_DB[skill] || [
                        { title: `Learn ${skill} â€“ Search YouTube`, url: `https://www.youtube.com/results?search_query=${encodeURIComponent('learn ' + skill + ' full course free')}`, type: 'Video', icon: 'play-circle' },
                        { title: `${skill} Documentation`, url: `https://www.google.com/search?q=${encodeURIComponent(skill + ' official documentation')}`, type: 'Documentation', icon: 'book-open' },
                      ];
                      const typeColors = {
                        'Documentation': { bg: 'bg-primary/10', border: 'border-primary/25', text: 'text-primary' },
                        'Video':         { bg: 'bg-rose-500/10', border: 'border-rose-500/25', text: 'text-rose-400' },
                        'Course':        { bg: 'bg-amber-500/10', border: 'border-amber-500/25', text: 'text-amber-400' },
                        'Interactive':   { bg: 'bg-accent/10', border: 'border-accent/25', text: 'text-accent' },
                        'Practice':      { bg: 'bg-success/10', border: 'border-success/25', text: 'text-success' },
                      };
                      return (
                        <div id={`resources-${skill}`} key={skill} className={`glass-card rounded-2xl p-6 ${selectedSkill === skill ? `ring-1 ring-accent/70` : ``}`} style={{ animationDelay: `${si * 0.05}s` }}>
                          <div className="flex items-center gap-3 mb-5">
                            <div className="w-9 h-9 rounded-xl bg-danger/10 border border-danger/20 flex items-center justify-center text-danger flex-shrink-0">
                              <i data-lucide="target" className="w-4 h-4"></i>
                            </div>
                            <div>
                              <div className="text-base font-bold font-grotesk text-slate-100">{skill}</div>
                              <div className="text-xs text-slate-500">Missing from your profile â€” {resources.length} free resource{resources.length !== 1 ? 's' : ''} below</div>
                            </div>
                          </div>
                          <div className="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-3">
                            {resources.map((res, ri) => {
                              const colors = typeColors[res.type] || typeColors['Documentation'];
                              return (
                                <a
                                  key={ri}
                                  href={res.url}
                                  target="_blank"
                                  rel="noopener noreferrer"
                                  className="group flex items-start gap-3 p-4 rounded-xl bg-black/20 border border-cardBorder hover:border-accent/30 hover:bg-accent/5 transition-all duration-300 hover:scale-[1.01] cursor-pointer"
                                >
                                  <div className={`w-8 h-8 rounded-lg ${colors.bg} border ${colors.border} flex items-center justify-center flex-shrink-0 transition-transform group-hover:scale-110`}>
                                    <i data-lucide={res.icon} className={`w-4 h-4 ${colors.text}`}></i>
                                  </div>
                                  <div className="flex-1 min-w-0">
                                    <div className="text-xs font-semibold text-slate-200 line-clamp-2 group-hover:text-accent transition-colors">{res.title}</div>
                                    <div className={`mt-1.5 inline-flex items-center gap-1 px-2 py-0.5 rounded-md text-[9px] font-bold uppercase tracking-wider ${colors.bg} ${colors.text} border ${colors.border}`}>
                                      {res.type}
                                    </div>
                                  </div>
                                  <i data-lucide="external-link" className="w-3.5 h-3.5 text-slate-600 flex-shrink-0 group-hover:text-accent transition-colors mt-0.5"></i>
                                </a>
                              );
                            })}
                          </div>
                        </div>
                      );
                    })}
                  </div>
                </div>

              </div>

              {/* FOOTER */}
              <footer className="py-6 border-t border-cardBorder text-center text-xs text-slate-500 bg-[#09090B]/60 backdrop-blur-md">
                <p>© 2026 ResuGO · High Fidelity Career Intelligence Portal · Apple Minimalist Styling</p>
              </footer>

            </main>
          </div>
        </div>
      );
    }

    // Render the React application
    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);

    // Initialize Lucide Icons after React mounts
    setTimeout(() => {
      lucide.createIcons();
    }, 1000);
  </script>
</body>
</html>
